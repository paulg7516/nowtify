name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}   # on-demand test build (artifacts only, no publish)

permissions:
  contents: write          # needed to publish GitHub Releases

jobs:
  # Build the OS matrix dynamically. Windows is gated until it passes manual
  # acceptance testing, so tag-triggered PUBLISHES (v* tags) build macOS only,
  # while workflow_dispatch test builds still build + upload Windows artifacts.
  # Re-add the Windows entry to the tag branch below once Windows is validated.
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo 'matrix={"include":[{"os":"macos-latest","args":"--mac --universal"}]}' >> "$GITHUB_OUTPUT"
          else
            echo 'matrix={"include":[{"os":"macos-latest","args":"--mac --universal"},{"os":"windows-latest","args":"--win"}]}' >> "$GITHUB_OUTPUT"
          fi
  build:
    needs: setup
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    # Tag (release) runs require approval via the protected 'release'
    # environment (a human must approve each publish - this is the gate that
    # keeps an unsigned auto-update build from shipping to clients without
    # sign-off). workflow_dispatch test builds get no environment, so on-demand
    # artifact builds stay friction-free.
    environment: ${{ startsWith(github.ref, 'refs/tags/v') && 'release' || '' }}
    steps:
      # Third-party actions pinned to commit SHAs (not moveable tags) so a
      # compromised/retargeted tag cannot inject into the release pipeline.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      # Code signing is DORMANT until the certificate secrets are added. This
      # step writes CSC_LINK to the env ONLY when the per-OS cert secret is
      # actually present, so an absent secret leaves CSC_LINK *unset* and
      # electron-builder skips signing (today's unsigned build). A
      # defined-but-empty CSC_LINK must be avoided - electron-builder treats it
      # as a real certificate path and the build fails. See docs/signing-setup.md.
      - name: Configure code signing
        shell: bash
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
          write_env() { printf '%s<<__GHEOF__\n%s\n__GHEOF__\n' "$1" "$2" >> "$GITHUB_ENV"; }
          if [ "${{ matrix.os }}" = "macos-latest" ] && [ -n "$MAC_CSC_LINK" ]; then
            write_env CSC_LINK "$MAC_CSC_LINK"
            write_env CSC_KEY_PASSWORD "$MAC_CSC_KEY_PASSWORD"
            write_env APPLE_ID "$APPLE_ID"
            write_env APPLE_APP_SPECIFIC_PASSWORD "$APPLE_APP_SPECIFIC_PASSWORD"
            write_env APPLE_TEAM_ID "$APPLE_TEAM_ID"
            echo "macOS code signing: ENABLED"
          elif [ "${{ matrix.os }}" = "windows-latest" ] && [ -n "$WIN_CSC_LINK" ]; then
            write_env CSC_LINK "$WIN_CSC_LINK"
            write_env CSC_KEY_PASSWORD "$WIN_CSC_KEY_PASSWORD"
            echo "Windows code signing: ENABLED"
          else
            echo "Code signing DORMANT (no certificate secret present) - unsigned build"
          fi
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - name: Build & publish
        if: startsWith(github.ref, 'refs/tags/v')
        run: npx electron-builder ${{ matrix.args }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build only (no publish)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: npx electron-builder ${{ matrix.args }} --publish never
      - name: Upload artifacts (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nowtify-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
          if-no-files-found: ignore
