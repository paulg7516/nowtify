name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}   # on-demand test build (artifacts only, no publish)

permissions:
  contents: write          # needed to publish GitHub Releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: --mac --universal
          - os: windows-latest
            args: --win
    runs-on: ${{ matrix.os }}
    # Tag (release) runs require approval via the protected 'release'
    # environment (a human must approve each publish - this is the gate that
    # keeps an unsigned auto-update build from shipping to clients without
    # sign-off). workflow_dispatch test builds get no environment, so on-demand
    # artifact builds stay friction-free.
    environment: ${{ startsWith(github.ref, 'refs/tags/v') && 'release' || '' }}
    steps:
      # Third-party actions pinned to commit SHAs (not moveable tags) so a
      # compromised/retargeted tag cannot inject into the release pipeline.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - name: Build & publish
        if: startsWith(github.ref, 'refs/tags/v')
        run: npx electron-builder ${{ matrix.args }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing - DORMANT until the cert secrets are added. When the
          # *_CSC_LINK secret is empty, electron-builder skips signing and the
          # build is unsigned (today's behavior). Add the secrets (see
          # docs/signing-setup.md) and releases sign automatically.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          CSC_LINK: ${{ matrix.os == 'macos-latest' && secrets.MAC_CSC_LINK || secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ matrix.os == 'macos-latest' && secrets.MAC_CSC_KEY_PASSWORD || secrets.WIN_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      - name: Build only (no publish)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: npx electron-builder ${{ matrix.args }} --publish never
        env:
          # Same dormant signing wiring as the publish step (test builds sign
          # too once the cert secrets exist; unsigned until then).
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          CSC_LINK: ${{ matrix.os == 'macos-latest' && secrets.MAC_CSC_LINK || secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ matrix.os == 'macos-latest' && secrets.MAC_CSC_KEY_PASSWORD || secrets.WIN_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      - name: Upload artifacts (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nowtify-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
          if-no-files-found: ignore
