<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none';" />
    <title>Nowtify</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: transparent;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        cursor: default;
        -webkit-user-select: none;
        user-select: none;
      }
      :root {
        --border-color: transparent;
        --border-width: 0px;
        --pulse-duration: 1.4s;
      }
      .frame {
        position: fixed;
        inset: 0;
        pointer-events: none;
        box-sizing: border-box;
        border: var(--border-width) solid var(--border-color);
        transition: border-color 200ms ease, border-width 200ms ease;
      }
      .frame.pulsing {
        /* Pulse for as long as the alert is active. If it gets annoying,
           the Pause control in the popover silences the pulse entirely
           (border goes away) without disabling the underlying triggers. */
        animation: pulse var(--pulse-duration) ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.35;
        }
      }
    </style>
  </head>
  <body>
    <div id="frame" class="frame"></div>
    <script src="./overlay.js"></script>
  </body>
</html>
