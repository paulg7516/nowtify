<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none';" />
    <title>Nowtify - Alerts</title>
    <style>
      :root {
        --bg: #14161c;
        --surface: #1b1e26;
        --surface-2: #232733;
        --surface-3: #2c313e;
        --border: #2a2e38;
        --border-strong: #3a4050;
        --text: #e6e8ec;
        --text-2: #b5b8bf;
        --text-3: #7c818b;
        --text-4: #5a5f69;
        --accent: #8b96ff;
        --accent-soft: rgba(139, 150, 255, 0.16);
        --success: #4ade80;
        --warning: #fbbf24;
        --danger: #f87171;
        --radius: 8px;
        --radius-sm: 6px;
        --transition: 140ms ease;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        background: var(--bg);
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui,
          sans-serif;
        color: var(--text);
        font-size: 13px;
        line-height: 1.45;
        -webkit-user-select: none;
        user-select: none;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      /* ============ Header ============ */
      header.app-header {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 13px 16px 11px;
        flex-shrink: 0;
        border-bottom: 1px solid var(--border);
      }
      .brand-mark {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
        display: block;
      }
      .header-title {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: -0.005em;
        color: var(--text);
        flex: 1;
        display: flex;
        align-items: baseline;
        gap: 8px;
      }
      .header-version {
        font-size: 10.5px;
        font-weight: 500;
        color: var(--text-4);
        font-variant-numeric: tabular-nums;
        letter-spacing: 0;
      }
      /* Engine error indicator - small triangle that appears in the
         header next to the version stamp when the engine's last tick had
         per-step failures. Click to see the error message.            */
      .header-engine-warn {
        font-size: 12px;
        color: #f87171;
        cursor: help;
        margin-left: 2px;
        line-height: 1;
      }
      .header-engine-warn[hidden] {
        display: none;
      }
      .icon-btn {
        display: grid;
        place-items: center;
        width: 26px;
        height: 26px;
        border-radius: 6px;
        background: transparent;
        color: var(--text-3);
        border: 0;
        cursor: pointer;
        transition: background var(--transition), color var(--transition);
      }
      .icon-btn:hover {
        background: var(--surface-2);
        color: var(--text);
      }
      .icon-btn svg {
        width: 14px;
        height: 14px;
      }

      /* ============ State banner (snoozed / paused) ============ */
      .state-banner {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 9px 16px;
        font-size: 12px;
        font-weight: 500;
        flex-shrink: 0;
        background: var(--surface);
        color: var(--text-2);
        border-bottom: 1px solid var(--border);
        transition: background 200ms ease, color 200ms ease;
      }
      .state-banner .state-banner-dot {
        background: var(--success);
      }
      .state-banner.snoozed {
        background: rgba(251, 191, 36, 0.08);
        color: var(--warning);
        border-bottom: 1px solid rgba(251, 191, 36, 0.15);
      }
      .state-banner.snoozed .state-banner-dot {
        background: currentColor;
      }
      .state-banner.paused {
        background: rgba(248, 113, 113, 0.08);
        color: var(--danger);
        border-bottom: 1px solid rgba(248, 113, 113, 0.15);
      }
      .state-banner.paused .state-banner-dot {
        background: currentColor;
      }
      .chevron-sm {
        width: 8px;
        height: 5px;
        opacity: 0.75;
      }
      /* Banner-positioned dropdown opens DOWNWARD (default opens upward) */
      .banner-dropdown {
        position: relative;
      }
      .banner-dropdown .dropdown-menu {
        bottom: auto;
        top: calc(100% + 4px);
        right: 0;
        left: auto;
      }
      .state-banner-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: currentColor;
        flex-shrink: 0;
      }
      .banner-text {
        flex: 1;
      }
      .banner-action {
        background: transparent;
        color: inherit;
        border: 1px solid currentColor;
        border-radius: 5px;
        padding: 2px 9px;
        font-size: 11px;
        font-weight: 500;
        font-family: inherit;
        cursor: pointer;
        opacity: 0.85;
        transition: opacity var(--transition), background var(--transition);
      }
      .banner-action:hover {
        opacity: 1;
        background: rgba(255, 255, 255, 0.08);
      }

      /* ============ Tabs ============ */
      .tabs {
        display: flex;
        padding: 0 12px;
        border-bottom: 1px solid var(--border);
        gap: 2px;
        flex-shrink: 0;
      }
      .tabs[hidden] {
        display: none;
      }
      .tab {
        padding: 9px 12px;
        font-size: 12px;
        font-weight: 600;
        color: var(--text-3);
        cursor: pointer;
        border-bottom: 2px solid transparent;
        margin-bottom: -1px;
        transition: color var(--transition), border-color var(--transition);
        display: inline-flex;
        align-items: center;
        gap: 7px;
        background: transparent;
        border-top: 0;
        border-left: 0;
        border-right: 0;
        font-family: inherit;
      }
      .tab:hover {
        color: var(--text-2);
      }
      .tab.active {
        color: var(--text);
        border-bottom-color: var(--accent);
      }
      .tab .count {
        background: var(--surface-2);
        color: var(--text-2);
        padding: 1px 7px;
        border-radius: 999px;
        font-size: 10.5px;
        font-weight: 600;
        min-width: 18px;
        text-align: center;
        line-height: 1.4;
      }
      .tab.active .count {
        background: var(--accent-soft);
        color: var(--accent);
      }

      /* ============ Body (alerts list or empty state) ============ */
      .body {
        flex: 1;
        overflow-y: auto;
        min-height: 0;
      }
      ul.alerts {
        list-style: none;
      }
      .alerts li {
        padding: 11px 16px;
        border-bottom: 1px solid var(--border);
        display: grid;
        grid-template-columns: 4px 1fr auto;
        gap: 11px;
        align-items: start;
      }
      .alerts li:last-child {
        border-bottom: 0;
      }
      .swatch {
        width: 4px;
        min-height: 36px;
        border-radius: 2px;
        align-self: stretch;
      }
      .meta {
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 0;
      }
      .key {
        font-weight: 600;
        font-size: 11px;
        color: var(--accent);
        text-decoration: none;
        cursor: pointer;
        letter-spacing: 0.01em;
      }
      .key:hover {
        text-decoration: underline;
      }
      .summary {
        font-size: 13px;
        color: var(--text);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .sub {
        font-size: 11px;
        color: var(--text-3);
        margin-top: 2px;
      }
      /* Per-row medium badge (Teams vs Outlook) in the Messages tab.
         Same person can ping you via either - the badge makes it obvious
         at a glance which surface the alert came from. Includes an
         inlined brand-mark SVG that matches the text color (Teams light
         purple, Outlook light blue).                                   */
      .medium-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 9.5px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        padding: 2px 6px;
        border-radius: 4px;
        margin-left: 6px;
        vertical-align: middle;
        line-height: 1;
      }
      .medium-badge svg {
        width: 10px;
        height: 10px;
        flex-shrink: 0;
        display: block;
      }
      .medium-badge[data-medium='teams'] {
        background: rgba(80, 89, 201, 0.16);
        color: #c8cdff;
      }
      .medium-badge[data-medium='outlook'] {
        background: rgba(0, 120, 212, 0.18);
        color: #b3dafb;
      }
      .meeting-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: rgba(80, 89, 201, 0.14);
        color: #d2d6ff;
        border: 1px solid rgba(80, 89, 201, 0.45);
        border-radius: 7px;
        padding: 5px 12px 5px 6px;
        font: inherit;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.005em;
        cursor: pointer;
        transition: background 140ms ease, border-color 140ms ease, color 140ms ease;
        white-space: nowrap;
        align-self: center;
      }
      .meeting-btn:hover {
        background: rgba(80, 89, 201, 0.25);
        border-color: rgba(140, 150, 240, 0.7);
        color: #f0f2ff;
      }
      .meeting-btn .teams-logo {
        width: 15px;
        height: 15px;
        display: block;
        flex-shrink: 0;
      }
      .meeting-btn .action-icon {
        width: 13px;
        height: 13px;
        display: block;
        flex-shrink: 0;
        opacity: 0.95;
      }
      .row-actions {
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .row-actions button {
        font-size: 11px;
        padding: 4px 9px;
        border-radius: 5px;
        background: transparent;
        color: var(--text-3);
        border: 1px solid transparent;
        cursor: pointer;
        font-family: inherit;
        transition: background var(--transition), color var(--transition), border-color var(--transition);
      }
      .row-actions button:hover {
        background: var(--surface-2);
        color: var(--text);
        border-color: var(--border-strong);
      }

      /* ============ Empty state ============ */
      .empty {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        padding: 40px 24px;
        text-align: center;
        height: 100%;
        min-height: 200px;
      }
      .empty-mark {
        width: 56px;
        height: 56px;
        opacity: 0.4;
      }
      .empty-title {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-2);
        letter-spacing: -0.005em;
      }
      .empty-message {
        font-size: 12px;
        color: var(--text-3);
        max-width: 32ch;
        line-height: 1.5;
      }

      /* ============ Footer ============ */
      footer.app-footer {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        border-top: 1px solid var(--border);
        background: var(--bg);
        flex-shrink: 0;
        font-size: 11px;
        color: var(--text-3);
      }
      .sync-time {
        flex: 1;
        font-variant-numeric: tabular-nums;
      }

      /* ============ Dropdown (snooze) ============ */
      .dropdown {
        position: relative;
      }
      .footer-btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 5px 9px;
        border-radius: 5px;
        background: transparent;
        color: var(--text-2);
        border: 1px solid transparent;
        cursor: pointer;
        font-size: 11px;
        font-weight: 500;
        font-family: inherit;
        transition: background var(--transition), color var(--transition), border-color var(--transition);
      }
      .footer-btn:hover {
        background: var(--surface-2);
        color: var(--text);
        border-color: var(--border-strong);
      }
      .footer-btn.danger:hover {
        background: rgba(248, 113, 113, 0.12);
        border-color: rgba(248, 113, 113, 0.35);
        color: var(--danger);
      }
      .footer-btn svg.chevron {
        width: 9px;
        height: 9px;
        opacity: 0.7;
      }
      .dropdown-menu {
        position: absolute;
        bottom: calc(100% + 4px);
        left: 0;
        min-width: 140px;
        background: var(--surface-2);
        border: 1px solid var(--border-strong);
        border-radius: 8px;
        padding: 4px;
        box-shadow: 0 12px 30px -10px rgba(0, 0, 0, 0.5),
          0 2px 6px rgba(0, 0, 0, 0.2);
        z-index: 10;
      }
      .dropdown-menu[hidden] {
        display: none;
      }
      .dropdown-menu button {
        display: flex;
        align-items: center;
        width: 100%;
        padding: 6px 10px;
        border-radius: 5px;
        background: transparent;
        color: var(--text);
        border: 0;
        cursor: pointer;
        font-size: 12px;
        font-family: inherit;
        text-align: left;
      }
      .dropdown-menu button:hover {
        background: var(--surface-3);
      }
      .dropdown-menu button.muted {
        color: var(--text-3);
      }
    </style>
  </head>
  <body>
    <header class="app-header">
      <svg class="brand-mark" viewBox="0 0 120 120" aria-hidden="true">
        <rect x="32" y="34" width="56" height="11" rx="3" fill="#a5b4fc" opacity="0.35"/>
        <rect x="26" y="52" width="68" height="14" rx="3.5" fill="#a5b4fc" opacity="0.65"/>
        <rect x="20" y="72" width="80" height="20" rx="5" fill="#a5b4fc"/>
      </svg>
      <span class="header-title" id="title">
        <span id="titleText">Nowtify</span>
        <span class="header-version" id="appVersion"></span>
        <span class="header-engine-warn" id="engineWarn" hidden title="">⚠</span>
      </span>
      <button id="refresh" class="icon-btn" title="Sync now" aria-label="Sync now">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M 13 6 a 5 5 0 0 0 -9 -1"/>
          <polyline points="13 2 13 6 9 6"/>
          <path d="M 3 10 a 5 5 0 0 0 9 1"/>
          <polyline points="3 14 3 10 7 10"/>
        </svg>
      </button>
    </header>

    <div id="stateBar" class="state-banner">
      <span class="state-banner-dot"></span>
      <span id="stateText" class="banner-text">Pulse alerts active</span>
      <div class="dropdown banner-dropdown" id="pauseDropdown">
        <button class="banner-action" id="pauseBtn" type="button">
          <span id="pauseBtnLabel">Pause</span>
          <svg id="pauseBtnChevron" class="chevron-sm" viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M 1 1 L 5 5 L 9 1"/>
          </svg>
        </button>
        <div class="dropdown-menu" id="pauseMenu" hidden>
          <button data-pause="5" type="button">For 5 minutes</button>
          <button data-pause="15" type="button">For 15 minutes</button>
          <button data-pause="30" type="button">For 30 minutes</button>
          <button data-pause="indefinite" type="button">Until I resume</button>
        </div>
      </div>
    </div>

    <div class="tabs" id="tabs">
      <button class="tab active" data-tab="incidents" type="button">
        Incidents <span class="count" id="tabCountIncidents">0</span>
      </button>
      <button class="tab" data-tab="approvals" type="button">
        Approvals <span class="count" id="tabCountApprovals">0</span>
      </button>
      <button class="tab" data-tab="messages" type="button">
        Messages <span class="count" id="tabCountMessages">0</span>
      </button>
    </div>

    <div class="body" id="body">
      <ul id="alerts" class="alerts"></ul>
    </div>

    <footer class="app-footer">
      <span class="sync-time" id="syncTime">Not synced yet</span>
      <button id="openSettings" class="footer-btn" type="button">Settings</button>
    </footer>

    <script src="./popover.js"></script>
  </body>
</html>
